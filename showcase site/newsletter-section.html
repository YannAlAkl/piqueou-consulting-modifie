


<section class="newsletter-section" id="newsletter">
  <div class="container">

    
    <div class="nl-header">
      <div class="nl-header-left">
        <h2>Cybersecurity &amp; GRC intelligence</h2>
        <p>Curated news from the most trusted sources in the industry</p>
      </div>
      <div class="nl-controls">
        <select id="nl-filter" class="nl-filter" aria-label="Filter by topic">
          <option value="all">All topics</option>
          <option value="ransomware">Ransomware</option>
          <option value="compliance">Compliance / GRC</option>
          <option value="vulnerability">Vulnerabilities</option>
          <option value="breach">Data breaches</option>
        </select>
        <button
          class="nl-refresh-btn"
          onclick="window.refreshNewsletter && window.refreshNewsletter()"
          aria-label="Refresh news">
          ↻ Refresh
        </button>
      </div>
    </div>

    
    <p id="nl-status" class="nl-status" aria-live="polite"></p>

    
    <div id="nl-container" role="feed" aria-label="Cybersecurity news">
      <div class="nl-loading">Loading news…</div>
    </div>

  </div>
  <script src="newsletter.js"></script>
</section>
